doctrine:
    dbal:
        # configure these for your database server
        # use postgresql for PostgreSQL
        # use sqlite for SQLite
        driver: 'pdo_mysql'
        server_version: 'mariadb-10.1.41'

        # only needed for MySQL
        charset: utf8mb4
        default_table_options:
            #charset: utf8mb4
            #collate: utf8mb4_unicode_ci
            charset: utf8
            collate: utf8_bin

        url: '%env(resolve:DATABASE_URL)%'

        mapping_types:
            enum: string
    orm:
        auto_generate_proxy_classes: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        auto_mapping: true
        mappings:
            BackSonataUserBundle: ~
            SonataUserBundle: ~
            FOSUserBundle: ~
            App:
                is_bundle: false
                type: annotation
                dir: '%kernel.project_dir%/src/Core/Entity'
                prefix: 'App\Core\Entity'
                alias: App
            translatable:
                type: annotation
                alias: Gedmo
                prefix: Gedmo\Translatable\Entity
                # make sure vendor library location is correct
                dir: "%kernel.vendor_dir%/gedmo/doctrine-extensions/lib/Gedmo/Translatable/Entity"